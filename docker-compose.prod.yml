version: '3.9'

services:

  # ─── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: sig_ftth_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sig_ftth}
      POSTGRES_USER: ${POSTGRES_USER:-sig_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sig_user} -d ${POSTGRES_DB:-sig_ftth}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sig_ftth_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sig_ftth_backend
    restart: always
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sig_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sig_ftth}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ALLOWED_ORIGINS: '["https://garo21225.github.io","https://${DOMAIN:-localhost}"]'
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend React (build prod) + Nginx ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_VERSION: "6.1.0"
    container_name: sig_ftth_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - public

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sig_ftth_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - public
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  logs_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
