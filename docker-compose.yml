version: '3.9'

services:

  # ─────────────────────────────────────────
  # BASE DE DONNÉES PostgreSQL + PostGIS
  # ─────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: sig_ftth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sig_ftth
      POSTGRES_USER: sig_user
      POSTGRES_PASSWORD: sig_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL",
             "pg_isready -U sig_user -d sig_ftth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS Cache
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sig_ftth_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli",
             "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BACKEND FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sig_ftth_backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me-super-secret-key-32chars
      DATABASE_URL: postgresql+asyncpg://sig_user:sig_password@db:5432/sig_ftth
      REDIS_URL: redis://:redis_password@redis:6379/0
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:80"]'
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ─────────────────────────────────────────
  # FRONTEND React
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sig_ftth_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads_data:
