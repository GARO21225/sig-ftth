[build]
  base    = "frontend"
  command = "python3 ../.github/scripts/fix_build.py && npx vite build"
  publish = "dist"

[build.environment]
  GITHUB_PAGES  = "false"
  VITE_API_URL  = "https://sig-ftth-production-a3aa.up.railway.app"
  VITE_APP_NAME = "SIG FTTH"
  NODE_VERSION  = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
