<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta name="description"
      content="SIG Web FTTH — Gestion réseau fibre optique et génie civil" />
    <link rel="manifest" href="/manifest.json" />
    <title>SIG FTTH v6.1</title>

    <!-- BUG #1 FIX — Restauration URL SPA après redirect 404 GitHub Pages -->
    <script>
      (function() {
        var query = window.location.search;
        if (query) {
          var match = query.match(/[?&]p=([^&]+)/);
          if (match) {
            var path = match[1].replace(/~and~/g, '&');
            var qMatch = query.match(/&q=([^&]+)/);
            var qs = qMatch ? '?' + qMatch[1].replace(/~and~/g, '&') : '';
            var hash = window.location.hash;
            window.history.replaceState(null, null, '/sig-ftth/' + path + qs + hash);
          }
        }
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== window.location.href) {
          window.history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
