<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SIG FTTH — Diagnostic</title>
  <style>
    body { background: #030712; color: #22c55e; font-family: monospace; padding: 2rem; margin: 0; }
    h1 { color: #3b82f6; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
    pre { background: #111827; padding: 1rem; border-radius: 8px; font-size: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>SIG FTTH v6.1 — Page de diagnostic</h1>
  <p class="ok">✅ HTML fonctionne</p>
  <p class="ok">✅ CSS fonctionne</p>
  <div id="js-status"><p style="color:#f59e0b">⏳ JavaScript en cours...</p></div>
  <div id="asset-status"><p style="color:#f59e0b">⏳ Vérification assets...</p></div>
  <pre id="log"></pre>

  <script>
    var log = document.getElementById('log');
    function addLog(msg, ok) {
      log.innerHTML += (ok ? '✅ ' : '❌ ') + msg + '\n';
    }

    document.getElementById('js-status').innerHTML = '<p class="ok">✅ JavaScript fonctionne</p>';

    // Test loading main JS
    var script = document.createElement('script');
    script.type = 'module';
    script.src = '/sig-ftth/assets/index-BuHk5joC.js';
    script.onload = function() { addLog('index-BuHk5joC.js chargé', true); };
    script.onerror = function(e) { 
      addLog('index-BuHk5joC.js ERREUR — fichier introuvable ou CORS', false);
      document.getElementById('asset-status').innerHTML = '<p class="err">❌ Assets manquants — uploadez le contenu de assets/ dans gh-pages</p>';
    };

    // Check CSS
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = '/sig-ftth/assets/index-CfyNdNKO.css';
    link.onload = function() { addLog('CSS chargé', true); };
    link.onerror = function() { addLog('CSS ERREUR', false); };

    document.head.appendChild(link);
    document.head.appendChild(script);

    addLog('URL: ' + window.location.href, true);
    addLog('BASE_URL attendu: /sig-ftth/', true);

    document.getElementById('asset-status').innerHTML = '<p style="color:#f59e0b">⏳ Test assets en cours...</p>';
  </script>
</body>
</html>
