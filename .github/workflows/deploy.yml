name: Deploy SIG FTTH
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_API_URL: 'https://sig-ftth-production-a3aa.up.railway.app'
        run: |
          npm install
          npx vite build
      - name: Add .nojekyll
        run: touch frontend/dist/.nojekyll
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - uses: actions/deploy-pages@v4
        id: deployment
