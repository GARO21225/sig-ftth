name: Deploy SIG FTTH

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Overwrite ImportDWGPage.tsx
        run: python3 -c "import base64; open('frontend/src/pages/ImportDWGPage.tsx','wb').write(base64.b64decode(''))"

      - name: Overwrite MapPage.tsx
        run: python3 -c "import base64; open('frontend/src/pages/MapPage.tsx','wb').write(base64.b64decode(''))"

      - name: Overwrite main.tsx
        run: python3 -c "import base64; open('frontend/src/main.tsx','wb').write(base64.b64decode(''))"

      - name: Overwrite api.ts
        run: python3 -c "import base64; open('frontend/src/services/api.ts','wb').write(base64.b64decode(''))"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_API_URL: 'https://sig-ftth-production-a3aa.up.railway.app'
          VITE_APP_NAME: 'SIG FTTH'
          VITE_APP_VERSION: '6.1.0'
        run: npx vite build

      - name: Add SPA routing files
        run: |
          touch frontend/dist/.nojekyll
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - uses: actions/deploy-pages@v4
        id: deployment
